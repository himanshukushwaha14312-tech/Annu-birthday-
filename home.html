<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Annu 🎉</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="bg.mp4" type="video/mp4">
</video>

<div id="intro">
  <h1>💖 For My Special Annu 💖</h1>
</div>

<div id="popup" class="popup">
  💖 Happy Birthday Annu 💖 <br> Tum meri duniya ho 😍
  <br><br>
  <button onclick="closePopup()">Close</button>
</div>

<div class="content">

<h1 class="glow">🎉 Happy Birthday Annu ❤️</h1>

<p id="typing"></p>

<button onclick="toggleMusic()">🎵 Music</button>

<h2>📸 Our Memories</h2>

<div class="slider">
  <img id="slide" src="photos/p1.jpg">
</div>

<div class="thumbs">
  <img src="photos/p1.jpg" onclick="showImg(this)">
  <img src="photos/p2.jpg" onclick="showImg(this)">
  <img src="photos/p3.jpg" onclick="showImg(this)">
  <img src="photos/p4.jpg" onclick="showImg(this)">
  <img src="photos/p5.jpg" onclick="showImg(this)">
</div>

<button onclick="showSurprise()">🎁 Surprise</button>
<p id="output"></p>

<button onclick="cutCake()">🎂 Cut Cake</button>
<p id="cakeMsg"></p>

<button onclick="fire()">🎆 Celebrate</button>

<h3>🎤 Special Message</h3>
<audio controls>
  <source src="voice.mp3">
</audio>

<br><br>
<button onclick="logout()">Logout</button>

</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>
<script src="script.js"></script>

<script>
setTimeout(() => {
  let intro = document.getElementById("intro");
  if (intro) intro.style.display = "none";
  if (typeof confetti === "function") confetti();
}, 3000);
</script>

</body>
</html>
